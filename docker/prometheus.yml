global:
  scrape_interval: 10s

rule_files:
  - /etc/prometheus/rules/mab-rules.yml

scrape_configs:
  - job_name: orchestrator-app
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["orchestrator-app:8081"]

  - job_name: tools-app
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["tools-app:8082"]
