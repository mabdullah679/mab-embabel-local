server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: orchestrator-app
  ai:
    mcp:
      client:
        name: mab-orchestrator-mcp-client
        version: 1.0.0
        type: SYNC
        request-timeout: 20s
        toolcallback:
          enabled: true
        sse:
          connections:
            tools:
              url: ${TOOLS_BASE_URL:http://localhost:8082}
              sse-endpoint: /sse

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true

tools:
  base-url: ${TOOLS_BASE_URL:http://localhost:8082}

ollama:
  base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  generation-model: ${OLLAMA_GENERATION_MODEL:qwen2.5:7b-instruct}
  fallback-model: ${OLLAMA_FALLBACK_MODEL:qwen2.5:3b}
  connect-timeout: ${OLLAMA_CONNECT_TIMEOUT:4s}
  read-timeout: ${OLLAMA_READ_TIMEOUT:45s}
