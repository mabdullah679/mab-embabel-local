services:
  ollama:
    image: ollama/ollama:latest
    container_name: mab-ollama
    gpus: all
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 10s

  tools-app:
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy

  orchestrator-app:
    environment:
      OLLAMA_BASE_URL: http://ollama:11434

volumes:
  ollama_data:
